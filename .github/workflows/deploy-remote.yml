name: Remote Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Deployment environment. Production requires GitHub Environment approval.
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      confirm:
        description: Type "deploy-staging" or "deploy-production" to confirm this run.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: remote-deploy-${{ inputs.deploy_env }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to remote host
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.deploy_env }}

    env:
      SELECTED_DEPLOY_ENV: ${{ inputs.deploy_env }}

      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_REPO: ${{ vars.DEPLOY_REPO }}
      DEPLOY_REF: ${{ vars.DEPLOY_REF }}
      DEPLOY_IMAGE: ${{ vars.DEPLOY_IMAGE }}
      DEPLOY_BUILD: ${{ vars.DEPLOY_BUILD }}
      DEPLOY_PULL: ${{ vars.DEPLOY_PULL }}
      APP_PORT: ${{ vars.APP_PORT }}
      DEPLOY_CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}

      DB_DRIVER: ${{ vars.DB_DRIVER }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_MAX_OPEN_CONNS: ${{ vars.DB_MAX_OPEN_CONNS }}
      DB_MAX_IDLE_CONNS: ${{ vars.DB_MAX_IDLE_CONNS }}
      REDIS_ENABLED: ${{ vars.REDIS_ENABLED }}
      REDIS_HOST: ${{ vars.REDIS_HOST }}
      REDIS_PORT: ${{ vars.REDIS_PORT }}
      REDIS_DB: ${{ vars.REDIS_DB }}
      REDIS_POOL_SIZE: ${{ vars.REDIS_POOL_SIZE }}
      REDIS_MIN_IDLE_CONNS: ${{ vars.REDIS_MIN_IDLE_CONNS }}
      REDIS_MAX_RETRIES: ${{ vars.REDIS_MAX_RETRIES }}
      REDIS_DIAL_TIMEOUT: ${{ vars.REDIS_DIAL_TIMEOUT }}
      REDIS_READ_TIMEOUT: ${{ vars.REDIS_READ_TIMEOUT }}
      REDIS_WRITE_TIMEOUT: ${{ vars.REDIS_WRITE_TIMEOUT }}
      SERVER_MODE: ${{ vars.SERVER_MODE }}
      SERVER_READ_TIMEOUT: ${{ vars.SERVER_READ_TIMEOUT }}
      SERVER_WRITE_TIMEOUT: ${{ vars.SERVER_WRITE_TIMEOUT }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      LOG_FORMAT: ${{ vars.LOG_FORMAT }}
      LOG_OUTPUT: ${{ vars.LOG_OUTPUT }}
      I18N_DEFAULT: ${{ vars.I18N_DEFAULT }}
      I18N_SUPPORTED: ${{ vars.I18N_SUPPORTED }}
      STORAGE_ENABLED: ${{ vars.STORAGE_ENABLED }}
      STORAGE_FS_TYPE: ${{ vars.STORAGE_FS_TYPE }}
      STORAGE_BASE_PATH: ${{ vars.STORAGE_BASE_PATH }}
      STORAGE_ENABLE_WATCH: ${{ vars.STORAGE_ENABLE_WATCH }}
      STORAGE_WATCH_BUFFER_SIZE: ${{ vars.STORAGE_WATCH_BUFFER_SIZE }}
      CORS_ENABLED: ${{ vars.CORS_ENABLED }}
      CORS_ALLOW_ORIGINS: ${{ vars.CORS_ALLOW_ORIGINS }}
      CORS_ALLOW_METHODS: ${{ vars.CORS_ALLOW_METHODS }}
      CORS_ALLOW_HEADERS: ${{ vars.CORS_ALLOW_HEADERS }}
      CORS_EXPOSE_HEADERS: ${{ vars.CORS_EXPOSE_HEADERS }}
      CORS_ALLOW_CREDENTIALS: ${{ vars.CORS_ALLOW_CREDENTIALS }}
      CORS_MAX_AGE: ${{ vars.CORS_MAX_AGE }}

      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm manual deployment
        env:
          CONFIRM_INPUT: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          expected_confirm="deploy-${SELECTED_DEPLOY_ENV}"
          if [ "${CONFIRM_INPUT}" != "${expected_confirm}" ]; then
            echo "::error::Type ${expected_confirm} in the confirm input to run this workflow."
            exit 1
          fi

      - name: Validate deployment inputs
        run: |
          set -euo pipefail

          normalize_yn() {
            local key="${1}"
            local value="${2}"
            case "${value}" in
              y|n) ;;
              yes|true|1) value="y" ;;
              no|false|0) value="n" ;;
              *)
                echo "::error::${key} must be y or n."
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          require_value() {
            local key="${1}"
            local value="${2:-}"
            if [ -z "${value}" ]; then
              echo "::error::Missing required ${key}."
              exit 1
            fi
          }

          reject_newline() {
            local key="${1}"
            local value="${2:-}"
            if [[ "${value}" == *$'\n'* || "${value}" == *$'\r'* ]]; then
              echo "::error::${key} cannot contain newlines."
              exit 1
            fi
          }

          require_value DEPLOY_HOST "${DEPLOY_HOST}"
          require_value DEPLOY_USER "${DEPLOY_USER}"
          require_value DEPLOY_SSH_KEY "${DEPLOY_SSH_KEY}"

          deploy_port="${DEPLOY_PORT:-22}"
          deploy_path="${DEPLOY_PATH:-/opt/go-scaffold}"
          deploy_build="$(normalize_yn DEPLOY_BUILD "${DEPLOY_BUILD:-y}")"
          deploy_pull="$(normalize_yn DEPLOY_PULL "${DEPLOY_PULL:-n}")"
          app_port="${APP_PORT:-9999}"

          if [ "${deploy_build}" = "y" ] && [ "${deploy_pull}" = "y" ]; then
            echo "::error::DEPLOY_BUILD and DEPLOY_PULL cannot both be y."
            exit 1
          fi

          case "${SELECTED_DEPLOY_ENV}" in
            staging|production) ;;
            *)
              echo "::error::deploy_env must be staging or production."
              exit 1
              ;;
          esac

          [[ "${DEPLOY_HOST}" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::Invalid DEPLOY_HOST."; exit 1; }
          [[ "${deploy_port}" =~ ^[0-9]+$ ]] || { echo "::error::Invalid DEPLOY_PORT."; exit 1; }
          [[ "${DEPLOY_USER}" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::Invalid DEPLOY_USER."; exit 1; }
          [[ "${deploy_path}" =~ ^/[A-Za-z0-9._/-]+$ ]] || { echo "::error::Invalid DEPLOY_PATH."; exit 1; }
          [[ "${app_port}" =~ ^[0-9]+$ ]] || { echo "::error::Invalid APP_PORT."; exit 1; }

          for key in \
            DEPLOY_REPO DEPLOY_REF DEPLOY_IMAGE DEPLOY_CONTAINER_NAME REGISTRY_HOST \
            DB_DRIVER DB_HOST DB_PORT DB_USER DB_PASSWORD DB_NAME DB_MAX_OPEN_CONNS DB_MAX_IDLE_CONNS \
            REDIS_ENABLED REDIS_HOST REDIS_PORT REDIS_PASSWORD REDIS_DB REDIS_POOL_SIZE REDIS_MIN_IDLE_CONNS REDIS_MAX_RETRIES \
            REDIS_DIAL_TIMEOUT REDIS_READ_TIMEOUT REDIS_WRITE_TIMEOUT SERVER_MODE SERVER_READ_TIMEOUT SERVER_WRITE_TIMEOUT \
            LOG_LEVEL LOG_FORMAT LOG_OUTPUT I18N_DEFAULT I18N_SUPPORTED STORAGE_ENABLED STORAGE_FS_TYPE STORAGE_BASE_PATH \
            STORAGE_ENABLE_WATCH STORAGE_WATCH_BUFFER_SIZE CORS_ENABLED CORS_ALLOW_ORIGINS CORS_ALLOW_METHODS \
            CORS_ALLOW_HEADERS CORS_EXPOSE_HEADERS CORS_ALLOW_CREDENTIALS CORS_MAX_AGE GHCR_USERNAME GHCR_TOKEN
          do
            reject_newline "${key}" "${!key:-}"
          done

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"

          deploy_port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${DEPLOY_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          else
            ssh-keyscan -p "${deploy_port}" "${DEPLOY_HOST}" > "${HOME}/.ssh/known_hosts" 2>/dev/null
          fi
          chmod 600 "${HOME}/.ssh/known_hosts"
          echo "DEPLOY_SSH_KEY_PATH=${HOME}/.ssh/deploy_key" >> "${GITHUB_ENV}"

      - name: Deploy with explicit flags
        run: |
          set -euo pipefail

          mask_secret() {
            local value="${1:-}"
            if [ -n "${value}" ]; then
              printf '::add-mask::%s\n' "${value}"
            fi
          }

          normalize_yn() {
            local value="${1}"
            case "${value}" in
              y|n) ;;
              yes|true|1) value="y" ;;
              no|false|0) value="n" ;;
              *)
                echo "::error::expected y or n."
                exit 1
                ;;
            esac
            printf '%s' "${value}"
          }

          add_arg() {
            local flag="${1}"
            local value="${2:-}"
            if [ -n "${value}" ]; then
              args+=("${flag}" "${value}")
            fi
          }

          sq() {
            local value="${1}"
            value=${value//\'/\'\\\'\'}
            printf "'%s'" "${value}"
          }

          mask_secret "${GHCR_TOKEN:-}"
          mask_secret "${DB_PASSWORD:-}"
          mask_secret "${REDIS_PASSWORD:-}"

          deploy_port="${DEPLOY_PORT:-22}"
          deploy_repo="${DEPLOY_REPO:-https://github.com/rin721/go-scaffold.git}"
          deploy_ref="${DEPLOY_REF:-${GITHUB_SHA}}"
          deploy_path="${DEPLOY_PATH:-/opt/go-scaffold}"
          deploy_image="${DEPLOY_IMAGE:-go-scaffold:local}"
          deploy_build="$(normalize_yn "${DEPLOY_BUILD:-y}")"
          deploy_pull="$(normalize_yn "${DEPLOY_PULL:-n}")"
          app_port="${APP_PORT:-9999}"
          deploy_container_name="${DEPLOY_CONTAINER_NAME:-go-scaffold}"
          registry_host="${REGISTRY_HOST:-ghcr.io}"

          args=(
            --docker y
            --env "${SELECTED_DEPLOY_ENV}"
            --repo "${deploy_repo}"
            --ref "${deploy_ref}"
            --path "${deploy_path}"
            --image "${deploy_image}"
            --build "${deploy_build}"
            --pull "${deploy_pull}"
            --port "${app_port}"
            --container-name "${deploy_container_name}"
            --registry-host "${registry_host}"
            --confirm
          )

          add_arg --registry-username "${GHCR_USERNAME:-}"
          add_arg --registry-token "${GHCR_TOKEN:-}"
          add_arg --db-driver "${DB_DRIVER:-}"
          add_arg --db-host "${DB_HOST:-}"
          add_arg --db-port "${DB_PORT:-}"
          add_arg --db-user "${DB_USER:-}"
          add_arg --db-password "${DB_PASSWORD:-}"
          add_arg --db-name "${DB_NAME:-}"
          add_arg --db-max-open-conns "${DB_MAX_OPEN_CONNS:-}"
          add_arg --db-max-idle-conns "${DB_MAX_IDLE_CONNS:-}"
          add_arg --redis-enabled "${REDIS_ENABLED:-}"
          add_arg --redis-host "${REDIS_HOST:-}"
          add_arg --redis-port "${REDIS_PORT:-}"
          add_arg --redis-password "${REDIS_PASSWORD:-}"
          add_arg --redis-db "${REDIS_DB:-}"
          add_arg --redis-pool-size "${REDIS_POOL_SIZE:-}"
          add_arg --redis-min-idle-conns "${REDIS_MIN_IDLE_CONNS:-}"
          add_arg --redis-max-retries "${REDIS_MAX_RETRIES:-}"
          add_arg --redis-dial-timeout "${REDIS_DIAL_TIMEOUT:-}"
          add_arg --redis-read-timeout "${REDIS_READ_TIMEOUT:-}"
          add_arg --redis-write-timeout "${REDIS_WRITE_TIMEOUT:-}"
          add_arg --server-mode "${SERVER_MODE:-}"
          add_arg --server-read-timeout "${SERVER_READ_TIMEOUT:-}"
          add_arg --server-write-timeout "${SERVER_WRITE_TIMEOUT:-}"
          add_arg --log-level "${LOG_LEVEL:-}"
          add_arg --log-format "${LOG_FORMAT:-}"
          add_arg --log-output "${LOG_OUTPUT:-}"
          add_arg --i18n-default "${I18N_DEFAULT:-}"
          add_arg --i18n-supported "${I18N_SUPPORTED:-}"
          add_arg --storage-enabled "${STORAGE_ENABLED:-}"
          add_arg --storage-fs-type "${STORAGE_FS_TYPE:-}"
          add_arg --storage-base-path "${STORAGE_BASE_PATH:-}"
          add_arg --storage-enable-watch "${STORAGE_ENABLE_WATCH:-}"
          add_arg --storage-watch-buffer-size "${STORAGE_WATCH_BUFFER_SIZE:-}"
          add_arg --cors-enabled "${CORS_ENABLED:-}"
          add_arg --cors-allow-origins "${CORS_ALLOW_ORIGINS:-}"
          add_arg --cors-allow-methods "${CORS_ALLOW_METHODS:-}"
          add_arg --cors-allow-headers "${CORS_ALLOW_HEADERS:-}"
          add_arg --cors-expose-headers "${CORS_EXPOSE_HEADERS:-}"
          add_arg --cors-allow-credentials "${CORS_ALLOW_CREDENTIALS:-}"
          add_arg --cors-max-age "${CORS_MAX_AGE:-}"

          remote_command="bash -s --"
          for arg in "${args[@]}"; do
            remote_command="${remote_command} $(sq "${arg}")"
          done

          ssh_opts=(-i "${DEPLOY_SSH_KEY_PATH}" -p "${deploy_port}" -o BatchMode=yes -o StrictHostKeyChecking=yes)
          target="${DEPLOY_USER}@${DEPLOY_HOST}"

          ssh "${ssh_opts[@]}" "${target}" "${remote_command}" < script/install.sh
