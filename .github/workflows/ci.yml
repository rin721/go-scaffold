name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Go verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Report Go formatting drift
        run: |
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$files" ]; then
            echo "Go files that would change with gofmt:"
            echo "$files"
          else
            echo "All Go files are gofmt formatted."
          fi

      - name: Run tests
        run: go test ./... -count=1 -mod=readonly

      - name: Build server
        run: go build -mod=readonly -o /tmp/go-scaffold-server ./cmd/main

      - name: Check whitespace
        run: git diff --check
