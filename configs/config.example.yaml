server:
  host: 127.0.0.1
  port: 9999
  mode: release
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

database:
  # Local default. Change to mysql/postgres only when the service is available.
  driver: sqlite
  dbname: ./data/app.db
  max_open_conns: 1
  max_idle_conns: 1

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  db: 0

logger:
  level: info
  format: console
  output: stdout

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  enabled: false
  fs_type: os
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

plugin:
  enabled: false
  default_timeout: 10
  max_response_bytes: 1048576
  interface:
    http:
      enabled: false
      host: 127.0.0.1
      port: 18080
      public_url: "http://127.0.0.1:18080"
    ws:
      public_url: "ws://127.0.0.1:18080/plugin/v1/ws"
  registration:
    enabled: false
    expose_on_main_http: false
    token: "replace-with-registration-token"
  plugins: []
  hooks: []

iam:
  enabled: false
  mode: memory
  default_deny: true
  tokens: []
  policies: []

auth:
  token_secret: "replace-with-at-least-32-character-secret"
  token_ttl: 86400

rbac:
  enabled: true
  apply_on_start: true
  model_path: ./configs/rbac_model.conf
  roles:
    - name: admin
      description: Built-in administrator role
    - name: user
      description: Built-in default user role
  permissions:
    - code: "*:*"
      description: All permissions
    - code: users:create
      description: Create users
    - code: users:read
      description: Read users
    - code: users:update
      description: Update users
    - code: users:delete
      description: Delete users
    - code: users:assign_roles
      description: Assign roles to users
    - code: roles:create
      description: Create roles
    - code: roles:read
      description: Read roles
    - code: roles:update
      description: Update roles
    - code: roles:delete
      description: Delete roles
    - code: roles:assign_permissions
      description: Assign permissions to roles
    - code: permissions:create
      description: Create permissions
    - code: permissions:read
      description: Read permissions
    - code: permissions:update
      description: Update permissions
    - code: permissions:delete
      description: Delete permissions
  role_permissions:
    - role: admin
      permissions:
        - "*:*"

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
    - X-Request-ID
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600
