server:
  host: 127.0.0.1
  port: 9999
  mode: release
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

database:
  # Local default. Change to mysql/postgres only when the service is available.
  driver: sqlite
  dbname: ./data/app.db
  max_open_conns: 1
  max_idle_conns: 1

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  db: 0

logger:
  level: info
  format: console
  output: stdout

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  enabled: false
  fs_type: os
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

plugin:
  enabled: false
  default_timeout: 10
  max_response_bytes: 1048576
  registration:
    enabled: false
    token: "replace-with-registration-token"
  plugins: []
  hooks: []

iam:
  enabled: false
  mode: memory
  default_deny: true
  tokens: []
  policies: []

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
    - X-Request-ID
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600
