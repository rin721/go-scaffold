services:
  go-scaffold:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE}
    container_name: ${DEPLOY_CONTAINER_NAME:-go-scaffold}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9999}:9999"
    environment:
      REI_CONFIG_PATH: /app/configs/config.yaml
      DB_DRIVER: ${DB_DRIVER:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-}
      REDIS_ENABLED: ${REDIS_ENABLED:-}
      REDIS_HOST: ${REDIS_HOST:-}
      REDIS_PORT: ${REDIS_PORT:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-}
      REDIS_MIN_IDLE_CONNS: ${REDIS_MIN_IDLE_CONNS:-}
      REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-}
      REDIS_DIAL_TIMEOUT: ${REDIS_DIAL_TIMEOUT:-}
      REDIS_READ_TIMEOUT: ${REDIS_READ_TIMEOUT:-}
      REDIS_WRITE_TIMEOUT: ${REDIS_WRITE_TIMEOUT:-}
      SERVER_MODE: ${SERVER_MODE:-}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      LOG_FORMAT: ${LOG_FORMAT:-}
      LOG_OUTPUT: ${LOG_OUTPUT:-}
      I18N_DEFAULT: ${I18N_DEFAULT:-}
      I18N_SUPPORTED: ${I18N_SUPPORTED:-}
      STORAGE_ENABLED: ${STORAGE_ENABLED:-}
      STORAGE_FS_TYPE: ${STORAGE_FS_TYPE:-}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-}
      STORAGE_ENABLE_WATCH: ${STORAGE_ENABLE_WATCH:-}
      STORAGE_WATCH_BUFFER_SIZE: ${STORAGE_WATCH_BUFFER_SIZE:-}
      CORS_ENABLED: ${CORS_ENABLED:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-}
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9999/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false
