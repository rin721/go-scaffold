services:
  go-scaffold:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE}
    container_name: ${DEPLOY_CONTAINER_NAME:-go-scaffold}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9999}:9999"
    environment:
      RIN_CONFIG_PATH: /app/configs/config.yaml
      RIN_APP_DB_DRIVER: ${RIN_APP_DB_DRIVER:-}
      RIN_APP_DB_HOST: ${RIN_APP_DB_HOST:-}
      RIN_APP_DB_PORT: ${RIN_APP_DB_PORT:-}
      RIN_APP_DB_USER: ${RIN_APP_DB_USER:-}
      RIN_APP_DB_PASSWORD: ${RIN_APP_DB_PASSWORD:-}
      RIN_APP_DB_NAME: ${RIN_APP_DB_NAME:-}
      RIN_APP_DB_MAX_OPEN_CONNS: ${RIN_APP_DB_MAX_OPEN_CONNS:-}
      RIN_APP_DB_MAX_IDLE_CONNS: ${RIN_APP_DB_MAX_IDLE_CONNS:-}
      RIN_APP_REDIS_ENABLED: ${RIN_APP_REDIS_ENABLED:-}
      RIN_APP_REDIS_HOST: ${RIN_APP_REDIS_HOST:-}
      RIN_APP_REDIS_PORT: ${RIN_APP_REDIS_PORT:-}
      RIN_APP_REDIS_PASSWORD: ${RIN_APP_REDIS_PASSWORD:-}
      RIN_APP_REDIS_DB: ${RIN_APP_REDIS_DB:-}
      RIN_APP_REDIS_POOL_SIZE: ${RIN_APP_REDIS_POOL_SIZE:-}
      RIN_APP_REDIS_MIN_IDLE_CONNS: ${RIN_APP_REDIS_MIN_IDLE_CONNS:-}
      RIN_APP_REDIS_MAX_RETRIES: ${RIN_APP_REDIS_MAX_RETRIES:-}
      RIN_APP_REDIS_DIAL_TIMEOUT: ${RIN_APP_REDIS_DIAL_TIMEOUT:-}
      RIN_APP_REDIS_READ_TIMEOUT: ${RIN_APP_REDIS_READ_TIMEOUT:-}
      RIN_APP_REDIS_WRITE_TIMEOUT: ${RIN_APP_REDIS_WRITE_TIMEOUT:-}
      RIN_APP_SERVER_MODE: ${RIN_APP_SERVER_MODE:-}
      RIN_APP_SERVER_READ_TIMEOUT: ${RIN_APP_SERVER_READ_TIMEOUT:-}
      RIN_APP_SERVER_WRITE_TIMEOUT: ${RIN_APP_SERVER_WRITE_TIMEOUT:-}
      RIN_APP_LOG_LEVEL: ${RIN_APP_LOG_LEVEL:-}
      RIN_APP_LOG_FORMAT: ${RIN_APP_LOG_FORMAT:-}
      RIN_APP_LOG_OUTPUT: ${RIN_APP_LOG_OUTPUT:-}
      RIN_APP_I18N_DEFAULT: ${RIN_APP_I18N_DEFAULT:-}
      RIN_APP_I18N_SUPPORTED: ${RIN_APP_I18N_SUPPORTED:-}
      RIN_APP_STORAGE_ENABLED: ${RIN_APP_STORAGE_ENABLED:-}
      RIN_APP_STORAGE_FS_TYPE: ${RIN_APP_STORAGE_FS_TYPE:-}
      RIN_APP_STORAGE_BASE_PATH: ${RIN_APP_STORAGE_BASE_PATH:-}
      RIN_APP_STORAGE_ENABLE_WATCH: ${RIN_APP_STORAGE_ENABLE_WATCH:-}
      RIN_APP_STORAGE_WATCH_BUFFER_SIZE: ${RIN_APP_STORAGE_WATCH_BUFFER_SIZE:-}
      RIN_APP_DEMO_ENABLED: ${RIN_APP_DEMO_ENABLED:-}
      RIN_APP_DEMO_APPLY_SCHEMA_ON_START: ${RIN_APP_DEMO_APPLY_SCHEMA_ON_START:-}
      RIN_APP_AUTH_TOKEN_SECRET: ${RIN_APP_AUTH_TOKEN_SECRET:?set RIN_APP_AUTH_TOKEN_SECRET}
      RIN_APP_AUTH_TOKEN_TTL: ${RIN_APP_AUTH_TOKEN_TTL:-86400}
      RIN_APP_AUTH_PUBLIC_REGISTRATION: ${RIN_APP_AUTH_PUBLIC_REGISTRATION:-false}
      RIN_APP_CORS_ENABLED: ${RIN_APP_CORS_ENABLED:-}
      RIN_APP_CORS_ALLOW_ORIGINS: ${RIN_APP_CORS_ALLOW_ORIGINS:-}
      RIN_APP_CORS_ALLOW_METHODS: ${RIN_APP_CORS_ALLOW_METHODS:-}
      RIN_APP_CORS_ALLOW_HEADERS: ${RIN_APP_CORS_ALLOW_HEADERS:-}
      RIN_APP_CORS_EXPOSE_HEADERS: ${RIN_APP_CORS_EXPOSE_HEADERS:-}
      RIN_APP_CORS_ALLOW_CREDENTIALS: ${RIN_APP_CORS_ALLOW_CREDENTIALS:-}
      RIN_APP_CORS_MAX_AGE: ${RIN_APP_CORS_MAX_AGE:-}
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9999/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false
